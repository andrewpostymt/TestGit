type: http
name: Logout current session
url: '{{baseUrl}}/auth/logout'
method: POST
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Success
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: text
        content: ''
    name: Unauthorized
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Not Found
