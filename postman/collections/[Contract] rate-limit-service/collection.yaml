  **Stable** — Production-ready, follows semantic versioning.

  Breaking changes are announced via workspace updates with a minimum of 30 days notice. Non-breaking additions (new endpoints, optional fields) may be introduced at any time. Deprecated endpoints will be marked in their individual request descriptions before removal.

