description: |-
  # Order Service API

  **Owner**: PostVehicle Enterprise Team ([#order-service-support](mailto:))
  **Status**: Stable
  **Last Updated**: May 2026

  ## Purpose

  The Order Service API provides comprehensive lifecycle management for orders — including creation, fulfillment, payments, returns, shipping, and analytics — and is used by internal platform teams, fulfillment systems, and third-party integrations.

  ## Quick Start

  1. Select the appropriate environment (e.g., `staging`, `production`) from the Postman environment selector
  2. Authenticate using your Bearer Token — store it as `token` in the active environment and set the `Authorization` header to `Bearer {{token}}`
  3. Run a lightweight request such as `GET /orders/summary` or `GET /orders` to verify connectivity
  4. Browse the endpoint groups below to find the operations relevant to your use case

  ## Authentication

  **Type**: Bearer Token

  Obtain your token from your platform admin or identity provider. Store it in the active Postman environment under the variable referenced by the collection's `Authorization` header. All requests require a valid, non-expired token.

