type: http
name: Generate packing slip
url: '{{baseUrl}}/orders/:orderId/documents/packing-slip/generate'
method: POST
pathVariables:
  - key: orderId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Success
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: text
        content: ''
    name: Unauthorized
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Not Found
