type: http
name: Create return exchange
url: '{{baseUrl}}/orders/:orderId/returns/:returnId/exchange'
method: POST
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: orderId
    value: string
  - key: returnId
    value: string
body:
  type: json
  content: '{}'
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Success
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Bad Request
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: text
        content: ''
    name: Unauthorized
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Not Found
