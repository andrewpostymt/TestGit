type: http
name: Send notification
url: '{{baseUrl}}/notifications/:notificationId/send'
method: POST
pathVariables:
  - key: notificationId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Success
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: text
        content: ''
    name: Unauthorized
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Not Found
