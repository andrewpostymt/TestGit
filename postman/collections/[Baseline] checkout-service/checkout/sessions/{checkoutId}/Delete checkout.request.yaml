type: http
name: Delete checkout
url: '{{baseUrl}}/checkout/sessions/:checkoutId'
method: DELETE
pathVariables:
  - key: checkoutId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: text
        content: ''
    name: Success
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: text
        content: ''
    name: Unauthorized
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Not Found
