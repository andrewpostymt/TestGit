  - ref: ./documents/folder.yaml
  - ref: ./analytics/folder.yaml
  - ref: ./notifications/folder.yaml
  - ref: ./automation/folder.yaml
  - ref: ./webhooks/folder.yaml
  - ref: ./integrations/folder.yaml
  - ref: ./batches/folder.yaml
  - ref: ./custom-fields/folder.yaml
  - ref: ./audit/folder.yaml
