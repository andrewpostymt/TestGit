openapi: 3.1.0
info:
  title: Customer Service
  description: Customer support tickets, live chat, knowledge base, and SLA management.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/customer-service
    description: Production
  - url: https://staging-api.example.com/v1/customer-service
    description: Staging
paths:
  /tickets:
    get:
      summary: List tickets
      operationId: get_tickets
      tags: [Tickets]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create ticket
      operationId: post_tickets
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}:
    get:
      summary: Get ticket
      operationId: get_tickets_ticketid
      tags: [Tickets]
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update ticket
      operationId: put_tickets_ticketid
      tags: [Tickets]
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update ticket
      operationId: patch_tickets_ticketid
      tags: [Tickets]
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete ticket
      operationId: delete_tickets_ticketid
      tags: [Tickets]
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}/assign:
    post:
      summary: Assign ticket
      operationId: post_tickets_ticketid_assign
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}/escalate:
    post:
      summary: Escalate ticket
      operationId: post_tickets_ticketid_escalate
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}/close:
    post:
      summary: Close ticket
      operationId: post_tickets_ticketid_close
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}/reopen:
    post:
      summary: Reopen ticket
      operationId: post_tickets_ticketid_reopen
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}/messages:
    get:
      summary: List ticket messages
      operationId: get_tickets_ticketid_messages
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}/messages:
    post:
      summary: Add message
      operationId: post_tickets_ticketid_messages
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /tickets/{ticketId}/attachments:
    post:
      summary: Upload attachment
      operationId: post_tickets_ticketid_attachments
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /knowledge-base:
    get:
      summary: List articles
      operationId: get_knowledge_base
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /knowledge-base:
    post:
      summary: Create article
      operationId: post_knowledge_base
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /knowledge-base/{articleId}:
    get:
      summary: Get article
      operationId: get_knowledge_base_articleid
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sla/policies:
    get:
      summary: List SLA policies
      operationId: get_sla_policies
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /agents:
    get:
      summary: List support agents
      operationId: get_agents
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /queues:
    get:
      summary: List support queues
      operationId: get_queues
      tags: [Tickets]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
