openapi: 3.1.0
info:
  title: Search Service
  description: Full-text search, faceted filtering, and relevance tuning across all entities.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/search
    description: Production
  - url: https://staging-api.example.com/v1/search
    description: Staging
paths:
  '/search/indices':
    get:
      summary: List indexs
      operationId: get_search_indices
      tags: [Search]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create index
      operationId: post_search_indices
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/indices/{indexId}':
    get:
      summary: Get index
      operationId: get_search_indices_indexid
      tags: [Search]
      parameters:
        - name: indexId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update index
      operationId: put_search_indices_indexid
      tags: [Search]
      parameters:
        - name: indexId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update index
      operationId: patch_search_indices_indexid
      tags: [Search]
      parameters:
        - name: indexId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete index
      operationId: delete_search_indices_indexid
      tags: [Search]
      parameters:
        - name: indexId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search':
    get:
      summary: Global search
      operationId: get_search
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/products':
    get:
      summary: Search products
      operationId: get_search_products
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/orders':
    get:
      summary: Search orders
      operationId: get_search_orders
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/customers':
    get:
      summary: Search customers
      operationId: get_search_customers
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/suggestions':
    get:
      summary: Get search suggestions
      operationId: get_search_suggestions
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/facets':
    post:
      summary: Get search facets
      operationId: post_search_facets
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/indices/{indexId}/rebuild':
    post:
      summary: Rebuild search index
      operationId: post_search_indices_indexid_rebuild
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/synonyms':
    get:
      summary: List synonyms
      operationId: get_search_synonyms
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Add synonyms
      operationId: post_search_synonyms
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/analytics':
    get:
      summary: Search analytics
      operationId: get_search_analytics
      tags: [Search]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/search/settings':
    put:
      summary: Update search settings
      operationId: put_search_settings
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
