openapi: 3.1.0
info:
  title: Recommendation Service
  description: Personalised product recommendations using ML models.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/recommendations
    description: Production
  - url: https://staging-api.example.com/v1/recommendations
    description: Staging
paths:
  /recommendations:
    get:
      summary: List recommendations
      operationId: get_recommendations
      tags: [Recommendations]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create recommendation
      operationId: post_recommendations
      tags: [Recommendations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/{recommendationId}:
    get:
      summary: Get recommendation
      operationId: get_recommendations_recommendationid
      tags: [Recommendations]
      parameters:
        - name: recommendationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update recommendation
      operationId: put_recommendations_recommendationid
      tags: [Recommendations]
      parameters:
        - name: recommendationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update recommendation
      operationId: patch_recommendations_recommendationid
      tags: [Recommendations]
      parameters:
        - name: recommendationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete recommendation
      operationId: delete_recommendations_recommendationid
      tags: [Recommendations]
      parameters:
        - name: recommendationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/products/{productId}/similar:
    get:
      summary: Get similar products
      operationId: get_recommendations_products_productid_similar
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/users/{userId}/personalised:
    get:
      summary: Get personalised recommendations
      operationId: get_recommendations_users_userid_personalised
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/trending:
    get:
      summary: Get trending products
      operationId: get_recommendations_trending
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/new-arrivals:
    get:
      summary: Get new arrivals
      operationId: get_recommendations_new_arrivals
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/bestsellers:
    get:
      summary: Get bestsellers
      operationId: get_recommendations_bestsellers
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/bundles:
    get:
      summary: Get product bundles
      operationId: get_recommendations_bundles
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/cross-sell:
    get:
      summary: Get cross-sell recommendations
      operationId: get_recommendations_cross_sell
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/upsell:
    get:
      summary: Get upsell recommendations
      operationId: get_recommendations_upsell
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/models:
    get:
      summary: List recommendation models
      operationId: get_recommendations_models
      tags: [Recommendations]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /recommendations/feedback:
    post:
      summary: Submit recommendation feedback
      operationId: post_recommendations_feedback
      tags: [Recommendations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
