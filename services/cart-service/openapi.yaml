openapi: 3.1.0
info:
  title: Cart Service
  description: Shopping cart management, line items, promotions, and checkout preparation.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/carts
    description: Production
  - url: https://staging-api.example.com/v1/carts
    description: Staging
paths:
  /carts:
    get:
      summary: List carts
      operationId: get_carts
      tags: [Carts]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create cart
      operationId: post_carts
      tags: [Carts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}:
    get:
      summary: Get cart
      operationId: get_carts_cartid
      tags: [Carts]
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update cart
      operationId: put_carts_cartid
      tags: [Carts]
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update cart
      operationId: patch_carts_cartid
      tags: [Carts]
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete cart
      operationId: delete_carts_cartid
      tags: [Carts]
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/items:
    post:
      summary: Add item to cart
      operationId: post_carts_cartid_items
      tags: [Carts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/items/{itemId}:
    put:
      summary: Update cart item
      operationId: put_carts_cartid_items_itemid
      tags: [Carts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/items/{itemId}:
    delete:
      summary: Remove cart item
      operationId: delete_carts_cartid_items_itemid
      tags: [Carts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/coupon:
    post:
      summary: Apply coupon
      operationId: post_carts_cartid_coupon
      tags: [Carts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/coupon:
    delete:
      summary: Remove coupon
      operationId: delete_carts_cartid_coupon
      tags: [Carts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/checkout:
    post:
      summary: Convert cart to order
      operationId: post_carts_cartid_checkout
      tags: [Carts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/totals:
    get:
      summary: Get cart totals
      operationId: get_carts_cartid_totals
      tags: [Carts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/merge:
    post:
      summary: Merge carts
      operationId: post_carts_cartid_merge
      tags: [Carts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/abandoned:
    get:
      summary: List abandoned carts
      operationId: get_carts_abandoned
      tags: [Carts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /carts/{cartId}/recover:
    post:
      summary: Recover abandoned cart
      operationId: post_carts_cartid_recover
      tags: [Carts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
