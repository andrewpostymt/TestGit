openapi: 3.1.0
info:
  title: Auth Service
  description: Authentication, authorization, OAuth2, tokens, and session management.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/auth
    description: Production
  - url: https://staging-api.example.com/v1/auth
    description: Staging
paths:
  /auth/tokens:
    get:
      summary: List tokens
      operationId: get_auth_tokens
      tags: [Auth]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create token
      operationId: post_auth_tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/tokens/{tokenId}:
    get:
      summary: Get token
      operationId: get_auth_tokens_tokenid
      tags: [Auth]
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update token
      operationId: put_auth_tokens_tokenid
      tags: [Auth]
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update token
      operationId: patch_auth_tokens_tokenid
      tags: [Auth]
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete token
      operationId: delete_auth_tokens_tokenid
      tags: [Auth]
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/login:
    post:
      summary: Login with credentials
      operationId: post_auth_login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/logout:
    post:
      summary: Logout current session
      operationId: post_auth_logout
      tags: [Auth]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: post_auth_refresh
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/register:
    post:
      summary: Register new account
      operationId: post_auth_register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/forgot-password:
    post:
      summary: Request password reset
      operationId: post_auth_forgot_password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/reset-password:
    post:
      summary: Reset password
      operationId: post_auth_reset_password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/verify-email:
    post:
      summary: Verify email address
      operationId: post_auth_verify_email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/oauth/authorize:
    get:
      summary: OAuth2 authorize endpoint
      operationId: get_auth_oauth_authorize
      tags: [Auth]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/oauth/token:
    post:
      summary: OAuth2 token exchange
      operationId: post_auth_oauth_token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/oauth/revoke:
    post:
      summary: Revoke OAuth2 token
      operationId: post_auth_oauth_revoke
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/saml/sso:
    get:
      summary: SAML SSO initiation
      operationId: get_auth_saml_sso
      tags: [Auth]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/permissions:
    get:
      summary: List permissions
      operationId: get_auth_permissions
      tags: [Auth]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/roles:
    get:
      summary: List roles
      operationId: get_auth_roles
      tags: [Auth]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/roles:
    post:
      summary: Create role
      operationId: post_auth_roles
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /auth/introspect:
    post:
      summary: Introspect token
      operationId: post_auth_introspect
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
