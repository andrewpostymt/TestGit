openapi: 3.1.0
info:
  title: Audit Service
  description: System-wide audit trail, compliance reporting, and event history.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/audit
    description: Production
  - url: https://staging-api.example.com/v1/audit
    description: Staging
paths:
  '/audit/events':
    get:
      summary: List events
      operationId: get_audit_events
      tags: [Audit]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create event
      operationId: post_audit_events
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/events/{eventId}':
    get:
      summary: Get event
      operationId: get_audit_events_eventid
      tags: [Audit]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update event
      operationId: put_audit_events_eventid
      tags: [Audit]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update event
      operationId: patch_audit_events_eventid
      tags: [Audit]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete event
      operationId: delete_audit_events_eventid
      tags: [Audit]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/logs':
    get:
      summary: Get audit logs
      operationId: get_audit_logs
      tags: [Audit]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/logs/export':
    post:
      summary: Export audit logs
      operationId: post_audit_logs_export
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/actors':
    get:
      summary: List actors
      operationId: get_audit_actors
      tags: [Audit]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/actions':
    get:
      summary: List action types
      operationId: get_audit_actions
      tags: [Audit]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/resources':
    get:
      summary: List resource types
      operationId: get_audit_resources
      tags: [Audit]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/compliance/report':
    post:
      summary: Generate compliance report
      operationId: post_audit_compliance_report
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/retention':
    get:
      summary: Get retention policy
      operationId: get_audit_retention
      tags: [Audit]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update retention policy
      operationId: put_audit_retention
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/alerts':
    get:
      summary: List audit alerts
      operationId: get_audit_alerts
      tags: [Audit]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create audit alert
      operationId: post_audit_alerts
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/audit/search':
    post:
      summary: Search audit log
      operationId: post_audit_search
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
