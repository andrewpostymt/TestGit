openapi: 3.1.0
info:
  title: Rate Limit Service
  description: API rate limiting rules, quota management, and throttle policies.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/rate-limits
    description: Production
  - url: https://staging-api.example.com/v1/rate-limits
    description: Staging
paths:
  '/rate-limits/policies':
    get:
      summary: List policys
      operationId: get_rate_limits_policies
      tags: [Rate Limits]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create policy
      operationId: post_rate_limits_policies
      tags: [Rate Limits]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/policies/{policyId}':
    get:
      summary: Get policy
      operationId: get_rate_limits_policies_policyid
      tags: [Rate Limits]
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update policy
      operationId: put_rate_limits_policies_policyid
      tags: [Rate Limits]
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update policy
      operationId: patch_rate_limits_policies_policyid
      tags: [Rate Limits]
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete policy
      operationId: delete_rate_limits_policies_policyid
      tags: [Rate Limits]
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/check':
    post:
      summary: Check rate limit
      operationId: post_rate_limits_check
      tags: [Rate Limits]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/quotas':
    get:
      summary: List quotas
      operationId: get_rate_limits_quotas
      tags: [Rate Limits]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/quotas/{quotaId}':
    put:
      summary: Update quota
      operationId: put_rate_limits_quotas_quotaid
      tags: [Rate Limits]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/usage':
    get:
      summary: Get usage statistics
      operationId: get_rate_limits_usage
      tags: [Rate Limits]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/reset':
    post:
      summary: Reset rate limit counter
      operationId: post_rate_limits_reset
      tags: [Rate Limits]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/allowlist':
    get:
      summary: Get allowlist
      operationId: get_rate_limits_allowlist
      tags: [Rate Limits]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Add to allowlist
      operationId: post_rate_limits_allowlist
      tags: [Rate Limits]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/blocklist':
    get:
      summary: Get blocklist
      operationId: get_rate_limits_blocklist
      tags: [Rate Limits]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Add to blocklist
      operationId: post_rate_limits_blocklist
      tags: [Rate Limits]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/rate-limits/analytics':
    get:
      summary: Rate limit analytics
      operationId: get_rate_limits_analytics
      tags: [Rate Limits]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
