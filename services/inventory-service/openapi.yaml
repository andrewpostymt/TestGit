openapi: 3.1.0
info:
  title: Inventory Service
  description: Inventory tracking, stock levels, warehouse management, and replenishment.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/inventory
    description: Production
  - url: https://staging-api.example.com/v1/inventory
    description: Staging
paths:
  /inventory/items:
    get:
      summary: List stocks
      operationId: get_inventory_items
      tags: [Inventory]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create stock
      operationId: post_inventory_items
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/items/{stockId}:
    get:
      summary: Get stock
      operationId: get_inventory_items_stockid
      tags: [Inventory]
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update stock
      operationId: put_inventory_items_stockid
      tags: [Inventory]
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update stock
      operationId: patch_inventory_items_stockid
      tags: [Inventory]
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete stock
      operationId: delete_inventory_items_stockid
      tags: [Inventory]
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/items/{itemId}/adjust:
    post:
      summary: Adjust stock level
      operationId: post_inventory_items_itemid_adjust
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/items/{itemId}/reserve:
    post:
      summary: Reserve stock
      operationId: post_inventory_items_itemid_reserve
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/items/{itemId}/release:
    post:
      summary: Release reserved stock
      operationId: post_inventory_items_itemid_release
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/locations:
    get:
      summary: List warehouse locations
      operationId: get_inventory_locations
      tags: [Inventory]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/locations:
    post:
      summary: Create location
      operationId: post_inventory_locations
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/transfers:
    get:
      summary: List stock transfers
      operationId: get_inventory_transfers
      tags: [Inventory]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/transfers:
    post:
      summary: Create stock transfer
      operationId: post_inventory_transfers
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/alerts:
    get:
      summary: Get low stock alerts
      operationId: get_inventory_alerts
      tags: [Inventory]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/replenishment:
    get:
      summary: Get replenishment orders
      operationId: get_inventory_replenishment
      tags: [Inventory]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/replenishment:
    post:
      summary: Create replenishment order
      operationId: post_inventory_replenishment
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/counts:
    get:
      summary: List stock counts
      operationId: get_inventory_counts
      tags: [Inventory]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/counts:
    post:
      summary: Create stock count
      operationId: post_inventory_counts
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/forecast:
    get:
      summary: Inventory forecast
      operationId: get_inventory_forecast
      tags: [Inventory]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /inventory/reports:
    get:
      summary: Inventory reports
      operationId: get_inventory_reports
      tags: [Inventory]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
