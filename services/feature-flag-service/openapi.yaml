openapi: 3.1.0
info:
  title: Feature Flag Service
  description: Feature toggle management with gradual rollout and A/B testing support.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/features
    description: Production
  - url: https://staging-api.example.com/v1/features
    description: Staging
paths:
  /features:
    get:
      summary: List flags
      operationId: get_features
      tags: [Feature Flags]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create flag
      operationId: post_features
      tags: [Feature Flags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/{flagId}:
    get:
      summary: Get flag
      operationId: get_features_flagid
      tags: [Feature Flags]
      parameters:
        - name: flagId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update flag
      operationId: put_features_flagid
      tags: [Feature Flags]
      parameters:
        - name: flagId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update flag
      operationId: patch_features_flagid
      tags: [Feature Flags]
      parameters:
        - name: flagId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete flag
      operationId: delete_features_flagid
      tags: [Feature Flags]
      parameters:
        - name: flagId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/{flagId}/enable:
    post:
      summary: Enable feature flag
      operationId: post_features_flagid_enable
      tags: [Feature Flags]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/{flagId}/disable:
    post:
      summary: Disable feature flag
      operationId: post_features_flagid_disable
      tags: [Feature Flags]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/{flagId}/rollout:
    put:
      summary: Update rollout percentage
      operationId: put_features_flagid_rollout
      tags: [Feature Flags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/{flagId}/targets:
    get:
      summary: Get targeting rules
      operationId: get_features_flagid_targets
      tags: [Feature Flags]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/{flagId}/targets:
    put:
      summary: Update targeting rules
      operationId: put_features_flagid_targets
      tags: [Feature Flags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/evaluate:
    post:
      summary: Evaluate flags for user
      operationId: post_features_evaluate
      tags: [Feature Flags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/{flagId}/history:
    get:
      summary: Flag change history
      operationId: get_features_flagid_history
      tags: [Feature Flags]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/ab-tests:
    get:
      summary: List A/B tests
      operationId: get_features_ab_tests
      tags: [Feature Flags]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/ab-tests:
    post:
      summary: Create A/B test
      operationId: post_features_ab_tests
      tags: [Feature Flags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/environments:
    get:
      summary: List environments
      operationId: get_features_environments
      tags: [Feature Flags]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /features/analytics:
    get:
      summary: Flag analytics
      operationId: get_features_analytics
      tags: [Feature Flags]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
