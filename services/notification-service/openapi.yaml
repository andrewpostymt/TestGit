openapi: 3.1.0
info:
  title: Notification Service
  description: Email, SMS, push notification delivery and template management.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/notifications
    description: Production
  - url: https://staging-api.example.com/v1/notifications
    description: Staging
paths:
  /notifications:
    get:
      summary: List notifications
      operationId: get_notifications
      tags: [Notifications]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create notification
      operationId: post_notifications
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/{notificationId}:
    get:
      summary: Get notification
      operationId: get_notifications_notificationid
      tags: [Notifications]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update notification
      operationId: put_notifications_notificationid
      tags: [Notifications]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update notification
      operationId: patch_notifications_notificationid
      tags: [Notifications]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete notification
      operationId: delete_notifications_notificationid
      tags: [Notifications]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/send:
    post:
      summary: Send notification
      operationId: post_notifications_send
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/send/bulk:
    post:
      summary: Send bulk notifications
      operationId: post_notifications_send_bulk
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/templates:
    get:
      summary: List templates
      operationId: get_notifications_templates
      tags: [Notifications]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/templates:
    post:
      summary: Create template
      operationId: post_notifications_templates
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/templates/{templateId}:
    get:
      summary: Get template
      operationId: get_notifications_templates_templateid
      tags: [Notifications]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/templates/{templateId}:
    put:
      summary: Update template
      operationId: put_notifications_templates_templateid
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/preferences:
    get:
      summary: Get notification preferences
      operationId: get_notifications_preferences
      tags: [Notifications]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/preferences:
    put:
      summary: Update preferences
      operationId: put_notifications_preferences
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/channels:
    get:
      summary: List notification channels
      operationId: get_notifications_channels
      tags: [Notifications]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/subscriptions:
    post:
      summary: Subscribe to notifications
      operationId: post_notifications_subscriptions
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/unsubscribe:
    post:
      summary: Unsubscribe
      operationId: post_notifications_unsubscribe
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /notifications/logs:
    get:
      summary: Notification delivery logs
      operationId: get_notifications_logs
      tags: [Notifications]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
