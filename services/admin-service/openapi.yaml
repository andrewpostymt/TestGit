openapi: 3.1.0
info:
  title: Admin Service
  description: Platform administration, system configuration, and operator tools.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/admin
    description: Production
  - url: https://staging-api.example.com/v1/admin
    description: Staging
paths:
  /admin/config:
    get:
      summary: List configs
      operationId: get_admin_config
      tags: [Admin]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create config
      operationId: post_admin_config
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/config/{configId}:
    get:
      summary: Get config
      operationId: get_admin_config_configid
      tags: [Admin]
      parameters:
        - name: configId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update config
      operationId: put_admin_config_configid
      tags: [Admin]
      parameters:
        - name: configId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update config
      operationId: patch_admin_config_configid
      tags: [Admin]
      parameters:
        - name: configId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete config
      operationId: delete_admin_config_configid
      tags: [Admin]
      parameters:
        - name: configId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/users:
    get:
      summary: List admin users
      operationId: get_admin_users
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/users:
    post:
      summary: Create admin user
      operationId: post_admin_users
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/users/{userId}/roles:
    put:
      summary: Update user roles
      operationId: put_admin_users_userid_roles
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/permissions:
    get:
      summary: List permissions
      operationId: get_admin_permissions
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/audit-log:
    get:
      summary: Get audit log
      operationId: get_admin_audit_log
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/system/health:
    get:
      summary: System health check
      operationId: get_admin_system_health
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/system/status:
    get:
      summary: System status
      operationId: get_admin_system_status
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/system/maintenance:
    post:
      summary: Enable maintenance mode
      operationId: post_admin_system_maintenance
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/features:
    get:
      summary: List feature flags
      operationId: get_admin_features
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/features/{featureId}:
    put:
      summary: Update feature flag
      operationId: put_admin_features_featureid
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/tenants:
    get:
      summary: List tenants
      operationId: get_admin_tenants
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/tenants:
    post:
      summary: Create tenant
      operationId: post_admin_tenants
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/backups:
    get:
      summary: List backups
      operationId: get_admin_backups
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/backups:
    post:
      summary: Trigger backup
      operationId: post_admin_backups
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/migrations:
    get:
      summary: List migrations
      operationId: get_admin_migrations
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/cache/flush:
    post:
      summary: Flush cache
      operationId: post_admin_cache_flush
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/jobs:
    get:
      summary: List background jobs
      operationId: get_admin_jobs
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/jobs/{jobId}/retry:
    post:
      summary: Retry failed job
      operationId: post_admin_jobs_jobid_retry
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /admin/metrics:
    get:
      summary: System metrics
      operationId: get_admin_metrics
      tags: [Admin]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
