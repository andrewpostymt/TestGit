openapi: 3.1.0
info:
  title: Shipping Service
  description: Carrier integrations, rate calculation, label generation, and tracking.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/shipping
    description: Production
  - url: https://staging-api.example.com/v1/shipping
    description: Staging
paths:
  '/shipments':
    get:
      summary: List shipments
      operationId: get_shipments
      tags: [Shipping]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create shipment
      operationId: post_shipments
      tags: [Shipping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipments/{shipmentId}':
    get:
      summary: Get shipment
      operationId: get_shipments_shipmentid
      tags: [Shipping]
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update shipment
      operationId: put_shipments_shipmentid
      tags: [Shipping]
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update shipment
      operationId: patch_shipments_shipmentid
      tags: [Shipping]
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete shipment
      operationId: delete_shipments_shipmentid
      tags: [Shipping]
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipments/{shipmentId}/track':
    get:
      summary: Track shipment
      operationId: get_shipments_shipmentid_track
      tags: [Shipping]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipments/{shipmentId}/label':
    post:
      summary: Generate label
      operationId: post_shipments_shipmentid_label
      tags: [Shipping]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/rates':
    post:
      summary: Calculate shipping rates
      operationId: post_shipping_rates
      tags: [Shipping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/carriers':
    get:
      summary: List carriers
      operationId: get_shipping_carriers
      tags: [Shipping]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/carriers/{carrierId}/services':
    get:
      summary: Get carrier services
      operationId: get_shipping_carriers_carrierid_services
      tags: [Shipping]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/zones':
    get:
      summary: List shipping zones
      operationId: get_shipping_zones
      tags: [Shipping]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/address/validate':
    post:
      summary: Validate address
      operationId: post_shipping_address_validate
      tags: [Shipping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/manifests':
    get:
      summary: List manifests
      operationId: get_shipping_manifests
      tags: [Shipping]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create manifest
      operationId: post_shipping_manifests
      tags: [Shipping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/pickups':
    get:
      summary: List pickups
      operationId: get_shipping_pickups
      tags: [Shipping]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Schedule pickup
      operationId: post_shipping_pickups
      tags: [Shipping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/shipping/insurance/quote':
    post:
      summary: Get insurance quote
      operationId: post_shipping_insurance_quote
      tags: [Shipping]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
