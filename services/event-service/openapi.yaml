openapi: 3.1.0
info:
  title: Event Service
  description: Event streaming, pub/sub messaging, and event replay for async workflows.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/events
    description: Production
  - url: https://staging-api.example.com/v1/events
    description: Staging
paths:
  /events:
    get:
      summary: List events
      operationId: get_events
      tags: [Events]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create event
      operationId: post_events
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/{eventId}:
    get:
      summary: Get event
      operationId: get_events_eventid
      tags: [Events]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update event
      operationId: put_events_eventid
      tags: [Events]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update event
      operationId: patch_events_eventid
      tags: [Events]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete event
      operationId: delete_events_eventid
      tags: [Events]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/publish:
    post:
      summary: Publish event
      operationId: post_events_publish
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/publish/batch:
    post:
      summary: Publish batch events
      operationId: post_events_publish_batch
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/topics:
    get:
      summary: List topics
      operationId: get_events_topics
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/topics:
    post:
      summary: Create topic
      operationId: post_events_topics
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/topics/{topicId}/subscriptions:
    get:
      summary: List subscriptions
      operationId: get_events_topics_topicid_subscriptions
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/topics/{topicId}/subscriptions:
    post:
      summary: Subscribe to topic
      operationId: post_events_topics_topicid_subscriptions
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/subscriptions/{subscriptionId}/pause:
    post:
      summary: Pause subscription
      operationId: post_events_subscriptions_subscriptionid_pause
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/subscriptions/{subscriptionId}/resume:
    post:
      summary: Resume subscription
      operationId: post_events_subscriptions_subscriptionid_resume
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/replay:
    post:
      summary: Replay events
      operationId: post_events_replay
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/dead-letter:
    get:
      summary: Get dead letter queue
      operationId: get_events_dead_letter
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/metrics:
    get:
      summary: Event metrics
      operationId: get_events_metrics
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/consumers:
    get:
      summary: List consumers
      operationId: get_events_consumers
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/schema-registry:
    get:
      summary: Get schema registry
      operationId: get_events_schema_registry
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/schema-registry:
    post:
      summary: Register schema
      operationId: post_events_schema_registry
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /events/filters:
    get:
      summary: List event filters
      operationId: get_events_filters
      tags: [Events]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
