openapi: 3.1.0
info:
  title: Workflow Service
  description: Business process automation, workflow definitions, and execution tracking.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/workflows
    description: Production
  - url: https://staging-api.example.com/v1/workflows
    description: Staging
paths:
  '/workflows':
    get:
      summary: List workflows
      operationId: get_workflows
      tags: [Workflows]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create workflow
      operationId: post_workflows
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}':
    get:
      summary: Get workflow
      operationId: get_workflows_workflowid
      tags: [Workflows]
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update workflow
      operationId: put_workflows_workflowid
      tags: [Workflows]
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update workflow
      operationId: patch_workflows_workflowid
      tags: [Workflows]
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete workflow
      operationId: delete_workflows_workflowid
      tags: [Workflows]
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/start':
    post:
      summary: Start workflow
      operationId: post_workflows_workflowid_start
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/pause':
    post:
      summary: Pause workflow
      operationId: post_workflows_workflowid_pause
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/resume':
    post:
      summary: Resume workflow
      operationId: post_workflows_workflowid_resume
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/cancel':
    post:
      summary: Cancel workflow
      operationId: post_workflows_workflowid_cancel
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/instances':
    get:
      summary: List workflow instances
      operationId: get_workflows_workflowid_instances
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/instances/{instanceId}':
    get:
      summary: Get workflow instance
      operationId: get_workflows_instances_instanceid
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/instances/{instanceId}/steps':
    get:
      summary: Get workflow steps
      operationId: get_workflows_instances_instanceid_steps
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/triggers':
    get:
      summary: List workflow triggers
      operationId: get_workflows_workflowid_triggers
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Add trigger
      operationId: post_workflows_workflowid_triggers
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/templates':
    get:
      summary: List workflow templates
      operationId: get_workflows_templates
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/export':
    get:
      summary: Export workflow definition
      operationId: get_workflows_workflowid_export
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/import':
    post:
      summary: Import workflow
      operationId: post_workflows_import
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/analytics':
    get:
      summary: Workflow analytics
      operationId: get_workflows_workflowid_analytics
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/{workflowId}/permissions':
    get:
      summary: Get workflow permissions
      operationId: get_workflows_workflowid_permissions
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update permissions
      operationId: put_workflows_workflowid_permissions
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/tasks':
    get:
      summary: List pending tasks
      operationId: get_workflows_tasks
      tags: [Workflows]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/workflows/tasks/{taskId}/complete':
    post:
      summary: Complete task
      operationId: post_workflows_tasks_taskid_complete
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
