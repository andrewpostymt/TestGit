openapi: 3.1.0
info:
  title: Review Service
  description: Product and vendor reviews, ratings, and moderation workflows.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/reviews
    description: Production
  - url: https://staging-api.example.com/v1/reviews
    description: Staging
paths:
  /reviews:
    get:
      summary: List reviews
      operationId: get_reviews
      tags: [Reviews]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create review
      operationId: post_reviews
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/{reviewId}:
    get:
      summary: Get review
      operationId: get_reviews_reviewid
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update review
      operationId: put_reviews_reviewid
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update review
      operationId: patch_reviews_reviewid
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete review
      operationId: delete_reviews_reviewid
      tags: [Reviews]
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/{reviewId}/approve:
    post:
      summary: Approve review
      operationId: post_reviews_reviewid_approve
      tags: [Reviews]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/{reviewId}/reject:
    post:
      summary: Reject review
      operationId: post_reviews_reviewid_reject
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/{reviewId}/flag:
    post:
      summary: Flag review
      operationId: post_reviews_reviewid_flag
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/{reviewId}/helpful:
    post:
      summary: Mark review as helpful
      operationId: post_reviews_reviewid_helpful
      tags: [Reviews]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/{reviewId}/reply:
    post:
      summary: Reply to review
      operationId: post_reviews_reviewid_reply
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/products/{productId}:
    get:
      summary: Get product reviews
      operationId: get_reviews_products_productid
      tags: [Reviews]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/summary/{productId}:
    get:
      summary: Get review summary
      operationId: get_reviews_summary_productid
      tags: [Reviews]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/moderation/queue:
    get:
      summary: Moderation queue
      operationId: get_reviews_moderation_queue
      tags: [Reviews]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /reviews/import:
    post:
      summary: Import reviews
      operationId: post_reviews_import
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
