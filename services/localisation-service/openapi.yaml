openapi: 3.1.0
info:
  title: Localisation Service
  description: Internationalisation, locale management, and translation workflows.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/l10n
    description: Production
  - url: https://staging-api.example.com/v1/l10n
    description: Staging
paths:
  '/locales':
    get:
      summary: List locales
      operationId: get_locales
      tags: [Localisation]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create locale
      operationId: post_locales
      tags: [Localisation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/locales/{localeId}':
    get:
      summary: Get locale
      operationId: get_locales_localeid
      tags: [Localisation]
      parameters:
        - name: localeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update locale
      operationId: put_locales_localeid
      tags: [Localisation]
      parameters:
        - name: localeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update locale
      operationId: patch_locales_localeid
      tags: [Localisation]
      parameters:
        - name: localeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete locale
      operationId: delete_locales_localeid
      tags: [Localisation]
      parameters:
        - name: localeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/locales/{localeCode}/translations':
    get:
      summary: Get translations for locale
      operationId: get_locales_localecode_translations
      tags: [Localisation]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update translations
      operationId: put_locales_localecode_translations
      tags: [Localisation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/translations/keys':
    get:
      summary: List translation keys
      operationId: get_translations_keys
      tags: [Localisation]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create translation key
      operationId: post_translations_keys
      tags: [Localisation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/translations/keys/{keyId}':
    put:
      summary: Update translation key
      operationId: put_translations_keys_keyid
      tags: [Localisation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/translations/import':
    post:
      summary: Import translations
      operationId: post_translations_import
      tags: [Localisation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/translations/export':
    post:
      summary: Export translations
      operationId: post_translations_export
      tags: [Localisation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/translations/missing':
    get:
      summary: Get missing translations
      operationId: get_translations_missing
      tags: [Localisation]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/currencies':
    get:
      summary: List supported currencies
      operationId: get_currencies
      tags: [Localisation]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/timezones':
    get:
      summary: List timezones
      operationId: get_timezones
      tags: [Localisation]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
