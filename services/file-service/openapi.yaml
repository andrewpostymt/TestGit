openapi: 3.1.0
info:
  title: File Service
  description: File upload, storage, CDN delivery, and media processing.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/files
    description: Production
  - url: https://staging-api.example.com/v1/files
    description: Staging
paths:
  '/files':
    get:
      summary: List files
      operationId: get_files
      tags: [Files]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create file
      operationId: post_files
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/{fileId}':
    get:
      summary: Get file
      operationId: get_files_fileid
      tags: [Files]
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update file
      operationId: put_files_fileid
      tags: [Files]
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update file
      operationId: patch_files_fileid
      tags: [Files]
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete file
      operationId: delete_files_fileid
      tags: [Files]
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/{fileId}/download':
    get:
      summary: Download file
      operationId: get_files_fileid_download
      tags: [Files]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/{fileId}/share':
    post:
      summary: Share file
      operationId: post_files_fileid_share
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/upload/presigned':
    post:
      summary: Get presigned upload URL
      operationId: post_files_upload_presigned
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/upload/multipart':
    post:
      summary: Initiate multipart upload
      operationId: post_files_upload_multipart
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/folders':
    get:
      summary: List folders
      operationId: get_files_folders
      tags: [Files]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create folder
      operationId: post_files_folders
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/{fileId}/move':
    post:
      summary: Move file
      operationId: post_files_fileid_move
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/{fileId}/copy':
    post:
      summary: Copy file
      operationId: post_files_fileid_copy
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/{fileId}/versions':
    get:
      summary: List file versions
      operationId: get_files_fileid_versions
      tags: [Files]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/search':
    get:
      summary: Search files
      operationId: get_files_search
      tags: [Files]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/{fileId}/thumbnail':
    get:
      summary: Get file thumbnail
      operationId: get_files_fileid_thumbnail
      tags: [Files]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/files/bulk/delete':
    post:
      summary: Bulk delete files
      operationId: post_files_bulk_delete
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
