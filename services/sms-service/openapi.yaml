openapi: 3.1.0
info:
  title: SMS Service
  description: SMS sending, number management, and delivery reporting.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/sms
    description: Production
  - url: https://staging-api.example.com/v1/sms
    description: Staging
paths:
  /sms/messages:
    get:
      summary: List messages
      operationId: get_sms_messages
      tags: [SMS]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create message
      operationId: post_sms_messages
      tags: [SMS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/messages/{messageId}:
    get:
      summary: Get message
      operationId: get_sms_messages_messageid
      tags: [SMS]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update message
      operationId: put_sms_messages_messageid
      tags: [SMS]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update message
      operationId: patch_sms_messages_messageid
      tags: [SMS]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete message
      operationId: delete_sms_messages_messageid
      tags: [SMS]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/send:
    post:
      summary: Send SMS
      operationId: post_sms_send
      tags: [SMS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/send/bulk:
    post:
      summary: Send bulk SMS
      operationId: post_sms_send_bulk
      tags: [SMS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/templates:
    get:
      summary: List SMS templates
      operationId: get_sms_templates
      tags: [SMS]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/templates:
    post:
      summary: Create SMS template
      operationId: post_sms_templates
      tags: [SMS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/numbers:
    get:
      summary: List phone numbers
      operationId: get_sms_numbers
      tags: [SMS]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/numbers:
    post:
      summary: Purchase phone number
      operationId: post_sms_numbers
      tags: [SMS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/opt-outs:
    get:
      summary: List opt-outs
      operationId: get_sms_opt_outs
      tags: [SMS]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/analytics:
    get:
      summary: SMS analytics
      operationId: get_sms_analytics
      tags: [SMS]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/inbound:
    get:
      summary: List inbound messages
      operationId: get_sms_inbound
      tags: [SMS]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/keywords:
    get:
      summary: List keywords
      operationId: get_sms_keywords
      tags: [SMS]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /sms/keywords:
    post:
      summary: Register keyword
      operationId: post_sms_keywords
      tags: [SMS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
