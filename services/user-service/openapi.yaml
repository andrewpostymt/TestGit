openapi: 3.1.0
info:
  title: User Service
  description: User account management, profiles, preferences, and authentication.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/users
    description: Production
  - url: https://staging-api.example.com/v1/users
    description: Staging
paths:
  '/users':
    get:
      summary: List users
      operationId: get_users
      tags: [Users]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create user
      operationId: post_users
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}':
    get:
      summary: Get user
      operationId: get_users_userid
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update user
      operationId: put_users_userid
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update user
      operationId: patch_users_userid
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete user
      operationId: delete_users_userid
      tags: [Users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/avatar':
    post:
      summary: Upload user avatar
      operationId: post_users_userid_avatar
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/preferences':
    get:
      summary: Get user preferences
      operationId: get_users_userid_preferences
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update user preferences
      operationId: put_users_userid_preferences
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/activity':
    get:
      summary: Get user activity log
      operationId: get_users_userid_activity
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/sessions':
    get:
      summary: List active sessions
      operationId: get_users_userid_sessions
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Revoke all sessions
      operationId: delete_users_userid_sessions
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/mfa':
    post:
      summary: Enable MFA
      operationId: post_users_userid_mfa
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Disable MFA
      operationId: delete_users_userid_mfa
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/me':
    get:
      summary: Get current user
      operationId: get_users_me
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update current user
      operationId: put_users_me
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/deactivate':
    post:
      summary: Deactivate user
      operationId: post_users_userid_deactivate
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/reactivate':
    post:
      summary: Reactivate user
      operationId: post_users_userid_reactivate
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/search':
    get:
      summary: Search users
      operationId: get_users_search
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/roles':
    get:
      summary: Get user roles
      operationId: get_users_userid_roles
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/users/{userId}/permissions':
    get:
      summary: Get user permissions
      operationId: get_users_userid_permissions
      tags: [Users]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
