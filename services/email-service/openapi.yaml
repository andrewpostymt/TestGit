openapi: 3.1.0
info:
  title: Email Service
  description: Transactional and marketing email delivery, templates, and analytics.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/email
    description: Production
  - url: https://staging-api.example.com/v1/email
    description: Staging
paths:
  /email/messages:
    get:
      summary: List emails
      operationId: get_email_messages
      tags: [Email]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create email
      operationId: post_email_messages
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/messages/{emailId}:
    get:
      summary: Get email
      operationId: get_email_messages_emailid
      tags: [Email]
      parameters:
        - name: emailId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update email
      operationId: put_email_messages_emailid
      tags: [Email]
      parameters:
        - name: emailId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update email
      operationId: patch_email_messages_emailid
      tags: [Email]
      parameters:
        - name: emailId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete email
      operationId: delete_email_messages_emailid
      tags: [Email]
      parameters:
        - name: emailId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/send:
    post:
      summary: Send email
      operationId: post_email_send
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/send/bulk:
    post:
      summary: Send bulk email
      operationId: post_email_send_bulk
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/templates:
    get:
      summary: List email templates
      operationId: get_email_templates
      tags: [Email]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/templates:
    post:
      summary: Create template
      operationId: post_email_templates
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/templates/{templateId}:
    get:
      summary: Get template
      operationId: get_email_templates_templateid
      tags: [Email]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/templates/{templateId}:
    put:
      summary: Update template
      operationId: put_email_templates_templateid
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/templates/{templateId}/preview:
    post:
      summary: Preview template
      operationId: post_email_templates_templateid_preview
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/domains:
    get:
      summary: List sending domains
      operationId: get_email_domains
      tags: [Email]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/domains:
    post:
      summary: Add sending domain
      operationId: post_email_domains
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/suppressions:
    get:
      summary: List suppressions
      operationId: get_email_suppressions
      tags: [Email]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/suppressions:
    post:
      summary: Add suppression
      operationId: post_email_suppressions
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/analytics:
    get:
      summary: Email analytics
      operationId: get_email_analytics
      tags: [Email]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/campaigns:
    get:
      summary: List campaigns
      operationId: get_email_campaigns
      tags: [Email]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /email/campaigns:
    post:
      summary: Create campaign
      operationId: post_email_campaigns
      tags: [Email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
