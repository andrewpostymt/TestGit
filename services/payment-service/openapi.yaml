openapi: 3.1.0
info:
  title: Payment Service
  description: Payment processing, refunds, subscriptions, and financial operations.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/payments
    description: Production
  - url: https://staging-api.example.com/v1/payments
    description: Staging
paths:
  '/payments':
    get:
      summary: List payments
      operationId: get_payments
      tags: [Payments]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create payment
      operationId: post_payments
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/{paymentId}':
    get:
      summary: Get payment
      operationId: get_payments_paymentid
      tags: [Payments]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update payment
      operationId: put_payments_paymentid
      tags: [Payments]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update payment
      operationId: patch_payments_paymentid
      tags: [Payments]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete payment
      operationId: delete_payments_paymentid
      tags: [Payments]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/{paymentId}/capture':
    post:
      summary: Capture payment
      operationId: post_payments_paymentid_capture
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/{paymentId}/void':
    post:
      summary: Void payment
      operationId: post_payments_paymentid_void
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/{paymentId}/refund':
    post:
      summary: Refund payment
      operationId: post_payments_paymentid_refund
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/methods':
    get:
      summary: List payment methods
      operationId: get_payments_methods
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Add payment method
      operationId: post_payments_methods
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/methods/{methodId}':
    delete:
      summary: Remove payment method
      operationId: delete_payments_methods_methodid
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/methods/{methodId}/default':
    post:
      summary: Set default payment method
      operationId: post_payments_methods_methodid_default
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/{paymentId}/dispute':
    post:
      summary: Create dispute
      operationId: post_payments_paymentid_dispute
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/transactions':
    get:
      summary: List transactions
      operationId: get_payments_transactions
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/reconcile':
    post:
      summary: Reconcile payments
      operationId: post_payments_reconcile
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/reports/daily':
    get:
      summary: Daily payment report
      operationId: get_payments_reports_daily
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/reports/monthly':
    get:
      summary: Monthly payment report
      operationId: get_payments_reports_monthly
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/webhooks':
    post:
      summary: Payment webhook endpoint
      operationId: post_payments_webhooks
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/payments/{paymentId}/receipt':
    get:
      summary: Get payment receipt
      operationId: get_payments_paymentid_receipt
      tags: [Payments]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
