openapi: 3.1.0
info:
  title: Discount Service
  description: Coupon codes, promotions, automatic discounts, and redemption tracking.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/discounts
    description: Production
  - url: https://staging-api.example.com/v1/discounts
    description: Staging
paths:
  '/discounts':
    get:
      summary: List discounts
      operationId: get_discounts
      tags: [Discounts]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create discount
      operationId: post_discounts
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/discounts/{discountId}':
    get:
      summary: Get discount
      operationId: get_discounts_discountid
      tags: [Discounts]
      parameters:
        - name: discountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update discount
      operationId: put_discounts_discountid
      tags: [Discounts]
      parameters:
        - name: discountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update discount
      operationId: patch_discounts_discountid
      tags: [Discounts]
      parameters:
        - name: discountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete discount
      operationId: delete_discounts_discountid
      tags: [Discounts]
      parameters:
        - name: discountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/discounts/{discountId}/apply':
    post:
      summary: Apply discount
      operationId: post_discounts_discountid_apply
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/discounts/{discountId}/usage':
    get:
      summary: Get discount usage
      operationId: get_discounts_discountid_usage
      tags: [Discounts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/discounts/{discountId}/activate':
    post:
      summary: Activate discount
      operationId: post_discounts_discountid_activate
      tags: [Discounts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/discounts/{discountId}/deactivate':
    post:
      summary: Deactivate discount
      operationId: post_discounts_discountid_deactivate
      tags: [Discounts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/coupons':
    get:
      summary: List coupon codes
      operationId: get_coupons
      tags: [Discounts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create coupon
      operationId: post_coupons
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/coupons/{couponId}':
    get:
      summary: Get coupon
      operationId: get_coupons_couponid
      tags: [Discounts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/coupons/validate':
    post:
      summary: Validate coupon
      operationId: post_coupons_validate
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/coupons/bulk':
    post:
      summary: Generate bulk coupons
      operationId: post_coupons_bulk
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/promotions':
    get:
      summary: List promotions
      operationId: get_promotions
      tags: [Discounts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create promotion
      operationId: post_promotions
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/promotions/{promotionId}/schedule':
    put:
      summary: Schedule promotion
      operationId: put_promotions_promotionid_schedule
      tags: [Discounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/discounts/analytics':
    get:
      summary: Discount analytics
      operationId: get_discounts_analytics
      tags: [Discounts]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
