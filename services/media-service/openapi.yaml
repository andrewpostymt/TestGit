openapi: 3.1.0
info:
  title: Media Service
  description: Image and video processing, CDN delivery, and asset optimisation.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/media
    description: Production
  - url: https://staging-api.example.com/v1/media
    description: Staging
paths:
  /media/assets:
    get:
      summary: List assets
      operationId: get_media_assets
      tags: [Media]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create asset
      operationId: post_media_assets
      tags: [Media]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/assets/{assetId}:
    get:
      summary: Get asset
      operationId: get_media_assets_assetid
      tags: [Media]
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update asset
      operationId: put_media_assets_assetid
      tags: [Media]
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update asset
      operationId: patch_media_assets_assetid
      tags: [Media]
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete asset
      operationId: delete_media_assets_assetid
      tags: [Media]
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/assets/{assetId}/transform:
    post:
      summary: Transform media
      operationId: post_media_assets_assetid_transform
      tags: [Media]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/assets/{assetId}/optimise:
    post:
      summary: Optimise asset
      operationId: post_media_assets_assetid_optimise
      tags: [Media]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/assets/{assetId}/cdn-url:
    get:
      summary: Get CDN URL
      operationId: get_media_assets_assetid_cdn_url
      tags: [Media]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/upload:
    post:
      summary: Upload media
      operationId: post_media_upload
      tags: [Media]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/upload/presigned:
    post:
      summary: Get presigned upload URL
      operationId: post_media_upload_presigned
      tags: [Media]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/collections:
    get:
      summary: List media collections
      operationId: get_media_collections
      tags: [Media]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/collections:
    post:
      summary: Create collection
      operationId: post_media_collections
      tags: [Media]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/assets/{assetId}/tags:
    get:
      summary: Get asset tags
      operationId: get_media_assets_assetid_tags
      tags: [Media]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/assets/{assetId}/tags:
    post:
      summary: Add tags to asset
      operationId: post_media_assets_assetid_tags
      tags: [Media]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/search:
    get:
      summary: Search media
      operationId: get_media_search
      tags: [Media]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /media/usage:
    get:
      summary: Get storage usage
      operationId: get_media_usage
      tags: [Media]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
