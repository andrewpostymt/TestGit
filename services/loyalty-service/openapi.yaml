openapi: 3.1.0
info:
  title: Loyalty Service
  description: Points, tiers, rewards, and customer loyalty programme management.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: platform@example.com
servers:
  - url: https://api.example.com/v1/loyalty
    description: Production
  - url: https://staging-api.example.com/v1/loyalty
    description: Staging
paths:
  '/loyalty/accounts':
    get:
      summary: List loyaltys
      operationId: get_loyalty_accounts
      tags: [Loyalty]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create loyalty
      operationId: post_loyalty_accounts
      tags: [Loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/accounts/{loyaltyId}':
    get:
      summary: Get loyalty
      operationId: get_loyalty_accounts_loyaltyid
      tags: [Loyalty]
      parameters:
        - name: loyaltyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      summary: Update loyalty
      operationId: put_loyalty_accounts_loyaltyid
      tags: [Loyalty]
      parameters:
        - name: loyaltyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    patch:
      summary: Partially update loyalty
      operationId: patch_loyalty_accounts_loyaltyid
      tags: [Loyalty]
      parameters:
        - name: loyaltyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      summary: Delete loyalty
      operationId: delete_loyalty_accounts_loyaltyid
      tags: [Loyalty]
      parameters:
        - name: loyaltyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/accounts/{accountId}/points':
    post:
      summary: Award points
      operationId: post_loyalty_accounts_accountid_points
      tags: [Loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/accounts/{accountId}/points/redeem':
    post:
      summary: Redeem points
      operationId: post_loyalty_accounts_accountid_points_redeem
      tags: [Loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/accounts/{accountId}/points/history':
    get:
      summary: Points history
      operationId: get_loyalty_accounts_accountid_points_history
      tags: [Loyalty]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/tiers':
    get:
      summary: List loyalty tiers
      operationId: get_loyalty_tiers
      tags: [Loyalty]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create tier
      operationId: post_loyalty_tiers
      tags: [Loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/rewards':
    get:
      summary: List rewards
      operationId: get_loyalty_rewards
      tags: [Loyalty]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create reward
      operationId: post_loyalty_rewards
      tags: [Loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/rewards/{rewardId}/claim':
    post:
      summary: Claim reward
      operationId: post_loyalty_rewards_rewardid_claim
      tags: [Loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/programmes':
    get:
      summary: List programmes
      operationId: get_loyalty_programmes
      tags: [Loyalty]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    post:
      summary: Create programme
      operationId: post_loyalty_programmes
      tags: [Loyalty]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/analytics':
    get:
      summary: Loyalty analytics
      operationId: get_loyalty_analytics
      tags: [Loyalty]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  '/loyalty/leaderboard':
    get:
      summary: Get points leaderboard
      operationId: get_loyalty_leaderboard
      tags: [Loyalty]
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
        '404':
          description: Not Found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
security:
  - BearerAuth: []
