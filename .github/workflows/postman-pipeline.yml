name: Postman Pipeline

# Runs the full CSE pipeline against the monorepo:
#   1. Bootstrap  — uploads each service's OpenAPI spec to Postman and
#                   generates baseline/smoke/contract collections
#   2. Repo Sync  — exports each collection to .postman/collections/ YAML stubs
#                   and writes .postman/resources.yaml; runs sequentially
#                   (max-parallel: 1) to avoid push conflicts
#   3. Docs       — generates natural-language descriptions for every
#                   collection in the workspace using the agent-docs action
#                   in git-mode; commits to a feature branch and opens a PR
#
# Required secrets:  POSTMAN_API_KEY
# Optional variables: POSTMAN_WORKSPACE_ID  (leave unset to auto-create)

on:
  workflow_dispatch:
    inputs:
      workspace-id:
        description: >-
          Existing Postman workspace ID to add services into.
          Leave empty to create a new workspace from order-service.
        required: false
      dry-run:
        description: 'Run docs step in dry-run mode (no PR opened)'
        required: false
        default: 'false'

jobs:

  # ---------------------------------------------------------------------------
  # Phase 1a — Bootstrap order-service (the anchor job)
  #
  # Creates (or joins) the workspace. All other bootstrap jobs depend on
  # this job's workspace-id output so they all land in the same workspace.
  # ---------------------------------------------------------------------------
  bootstrap-anchor:
    name: Bootstrap order-service
    runs-on: ubuntu-latest
    outputs:
      workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap order-service
        id: bootstrap
        uses: postman-cs/postman-bootstrap-action@main
        with:
          project-name:   order-service
          spec-url:       https://raw.githubusercontent.com/andrewpostymt/TestGit/main/services/order-service/openapi.yaml
          workspace-id:   ${{ inputs.workspace-id || vars.POSTMAN_WORKSPACE_ID }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}

      - name: Print workspace info
        run: |
          echo "workspace-id:   ${{ steps.bootstrap.outputs.workspace-id }}"
          echo "workspace-name: ${{ steps.bootstrap.outputs.workspace-name }}"
          echo "workspace-url:  ${{ steps.bootstrap.outputs.workspace-url }}"
          echo "collections:    ${{ steps.bootstrap.outputs.collections-json }}"

  # ---------------------------------------------------------------------------
  # Phase 1b — Bootstrap all remaining services (matrix)
  #
  # Each job targets the same workspace created/identified in Phase 1a.
  # fail-fast: false so one bad spec does not cancel the rest.
  # ---------------------------------------------------------------------------
  bootstrap-services:
    name: Bootstrap ${{ matrix.service }}
    needs: bootstrap-anchor
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service:
          - user-service
          - auth-service
          - product-service
          - payment-service
          - inventory-service
          - notification-service
          - shipping-service
          - review-service
          - search-service
          - analytics-service
          - customer-service
          - catalog-service
          - cart-service
          - checkout-service
          - recommendation-service
          - subscription-service
          - billing-service
          - admin-service
          - webhook-service
          - file-service
          - email-service
          - sms-service
          - audit-service
          - config-service
          - feature-flag-service
          - event-service
          - workflow-service
          - document-service
          - media-service
          - localisation-service
          - tax-service
          - discount-service
          - loyalty-service
          - rate-limit-service

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap ${{ matrix.service }}
        id: bootstrap
        uses: postman-cs/postman-bootstrap-action@main
        with:
          project-name:   ${{ matrix.service }}
          spec-url:       https://raw.githubusercontent.com/andrewpostymt/TestGit/main/services/${{ matrix.service }}/openapi.yaml
          workspace-id:   ${{ needs.bootstrap-anchor.outputs.workspace-id }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}

      - name: Print collection outputs
        run: |
          echo "service:       ${{ matrix.service }}"
          echo "collections:   ${{ steps.bootstrap.outputs.collections-json }}"

  # ---------------------------------------------------------------------------
  # Phase 2 — Repo sync (sequential matrix)
  #
  # Exports each service's collections to .postman/collections/<service>/
  # YAML stubs and writes/updates .postman/resources.yaml so Phase 3 can
  # run in git-mode.  max-parallel: 1 ensures each job completes its
  # commit-and-push before the next job checks out the updated branch.
  # ---------------------------------------------------------------------------
  repo-sync:
    name: Repo sync ${{ matrix.service }}
    needs: [bootstrap-anchor, bootstrap-services]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service:
          - order-service
          - user-service
          - auth-service
          - product-service
          - payment-service
          - inventory-service
          - notification-service
          - shipping-service
          - review-service
          - search-service
          - analytics-service
          - customer-service
          - catalog-service
          - cart-service
          - checkout-service
          - recommendation-service
          - subscription-service
          - billing-service
          - admin-service
          - webhook-service
          - file-service
          - email-service
          - sms-service
          - audit-service
          - config-service
          - feature-flag-service
          - event-service
          - workflow-service
          - document-service
          - media-service
          - localisation-service
          - tax-service
          - discount-service
          - loyalty-service
          - rate-limit-service

    steps:
      - uses: actions/checkout@v4

      - name: Repo sync ${{ matrix.service }}
        uses: postman-cs/postman-repo-sync-action@main
        with:
          project-name:         ${{ matrix.service }}
          workspace-id:         ${{ needs.bootstrap-anchor.outputs.workspace-id }}
          postman-api-key:      ${{ secrets.POSTMAN_API_KEY }}
          github-token:         ${{ secrets.GITHUB_TOKEN }}
          generate-ci-workflow: 'false'

  # ---------------------------------------------------------------------------
  # Phase 3 — Generate documentation (git-mode)
  #
  # Runs after all repo-sync jobs complete. Reads .postman/resources.yaml to
  # resolve every collection, generates natural-language descriptions via
  # the agent-docs action, commits the patched YAML files to a feature
  # branch, and opens a GitHub PR against main for review.
  # After the PR is merged, re-run this workflow with apply-from-repo to
  # push the approved descriptions back to the live Postman collections.
  # ---------------------------------------------------------------------------
  generate-docs:
    name: Generate collection documentation
    needs: [bootstrap-anchor, repo-sync]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate docs for all collections
        id: docs
        uses: andrewpostymt/postman-agent-docs-action@main
        with:
          postman-api-key:    ${{ secrets.POSTMAN_API_KEY }}
          workspace-id:       ${{ needs.bootstrap-anchor.outputs.workspace-id }}
          git-mode:           'true'
          github-token:       ${{ secrets.GITHUB_TOKEN }}
          overwrite-existing: 'true'
          dry-run:            ${{ inputs.dry-run }}

      - name: Print docs results
        run: |
          echo "branch-name:         ${{ steps.docs.outputs.branch-name }}"
          echo "collections-updated: ${{ steps.docs.outputs.collections-updated }}"
          echo "collections-skipped: ${{ steps.docs.outputs.collections-skipped }}"
          echo ""
          echo "Results:"
          echo '${{ steps.docs.outputs.results-json }}' | jq '.'
