name: Postman Pipeline

# Runs the full CSE pipeline against the monorepo using the canonical
# onboarding action (bootstrap + repo sync combined) per service, then
# generates natural-language collection documentation via git-mode PR.
#
# Phase 1a — Onboard anchor service (creates/joins the workspace)
# Phase 1b — Onboard all remaining services (sequential, max-parallel: 1
#             to avoid commit-and-push conflicts during repo sync)
# Phase 2  — Generate docs for all collections in git-mode; commits
#             descriptions to a feature branch and opens a GitHub PR
#
# Required secrets:  POSTMAN_API_KEY
# Optional variables: POSTMAN_WORKSPACE_ID  (leave unset to auto-create)

on:
  workflow_dispatch:
    inputs:
      workspace-id:
        description: >-
          Existing Postman workspace ID to add services into.
          Leave empty to create a new workspace from order-service.
        required: false
      dry-run:
        description: 'Run docs step in dry-run mode (no PR opened)'
        required: false
        default: 'false'

jobs:

  # ---------------------------------------------------------------------------
  # Phase 1a — Onboard anchor service (order-service)
  #
  # Runs bootstrap + repo sync for the anchor. Creates (or joins) the
  # workspace and outputs the workspace-id for all subsequent jobs.
  # ---------------------------------------------------------------------------
  onboarding-anchor:
    name: Onboard order-service
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      workspace-id: ${{ steps.onboard.outputs.workspace-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Onboard order-service
        id: onboard
        uses: postman-cs/postman-api-onboarding-action@main
        with:
          project-name:         order-service
          spec-url:             https://raw.githubusercontent.com/andrewpostymt/TestGit/main/services/order-service/openapi.yaml
          workspace-id:         ${{ inputs.workspace-id || vars.POSTMAN_WORKSPACE_ID }}
          postman-api-key:      ${{ secrets.POSTMAN_API_KEY }}
          github-token:         ${{ secrets.GITHUB_TOKEN }}
          generate-ci-workflow: 'false'

      - name: Print workspace info
        run: |
          echo "workspace-id:   ${{ steps.onboard.outputs.workspace-id }}"
          echo "workspace-url:  ${{ steps.onboard.outputs.workspace-url }}"
          echo "collections:    ${{ steps.onboard.outputs.collections-json }}"

  # ---------------------------------------------------------------------------
  # Phase 1b — Onboard all remaining services
  #
  # Each job runs bootstrap + repo sync for one service, targeting the
  # workspace created in Phase 1a. max-parallel: 1 ensures each commit-
  # and-push from repo sync completes before the next job checks out.
  # fail-fast: false so one bad spec does not cancel the rest.
  # ---------------------------------------------------------------------------
  onboarding-services:
    name: Onboard ${{ matrix.service }}
    needs: onboarding-anchor
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service:
          - user-service
          - auth-service
          - product-service
          - payment-service
          - inventory-service
          - notification-service
          - shipping-service
          - review-service
          - search-service
          - analytics-service
          - customer-service
          - catalog-service
          - cart-service
          - checkout-service
          - recommendation-service
          - subscription-service
          - billing-service
          - admin-service
          - webhook-service
          - file-service
          - email-service
          - sms-service
          - audit-service
          - config-service
          - feature-flag-service
          - event-service
          - workflow-service
          - document-service
          - media-service
          - localisation-service
          - tax-service
          - discount-service
          - loyalty-service
          - rate-limit-service

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest main before onboarding
        run: git pull --rebase origin main

      - name: Onboard ${{ matrix.service }}
        id: onboard
        uses: postman-cs/postman-api-onboarding-action@main
        with:
          project-name:         ${{ matrix.service }}
          spec-url:             https://raw.githubusercontent.com/andrewpostymt/TestGit/main/services/${{ matrix.service }}/openapi.yaml
          workspace-id:         ${{ needs.onboarding-anchor.outputs.workspace-id }}
          postman-api-key:      ${{ secrets.POSTMAN_API_KEY }}
          github-token:         ${{ secrets.GITHUB_TOKEN }}
          generate-ci-workflow: 'false'

      - name: Print collection outputs
        run: |
          echo "service:     ${{ matrix.service }}"
          echo "collections: ${{ steps.onboard.outputs.collections-json }}"
          echo "mock-url:    ${{ steps.onboard.outputs.mock-url }}"
          echo "monitor-id:  ${{ steps.onboard.outputs.monitor-id }}"

  # ---------------------------------------------------------------------------
  # Phase 2 — Generate documentation (git-mode)
  #
  # Runs after all onboarding jobs complete. Reads .postman/resources.yaml
  # (written by repo sync in Phase 1) to resolve every collection, generates
  # natural-language descriptions, commits patched YAML files to a feature
  # branch, and opens a GitHub PR against main for review.
  # ---------------------------------------------------------------------------
  generate-docs:
    name: Generate collection documentation
    needs: [onboarding-anchor, onboarding-services]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate docs for all collections
        id: docs
        uses: andrewpostymt/postman-agent-docs-action@main
        with:
          postman-api-key:      ${{ secrets.POSTMAN_API_KEY }}
          workspace-id:         ${{ needs.onboarding-anchor.outputs.workspace-id }}
          git-mode:             'true'
          github-token:         ${{ secrets.GITHUB_TOKEN }}
          agent-mode:           'true'
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          overwrite-existing:   'true'
          dry-run:              ${{ inputs.dry-run }}

      - name: Print docs results
        run: |
          echo "branch-name:         ${{ steps.docs.outputs.branch-name }}"
          echo "collections-updated: ${{ steps.docs.outputs.collections-updated }}"
          echo "collections-skipped: ${{ steps.docs.outputs.collections-skipped }}"
          echo ""
          echo "Results:"
          echo '${{ steps.docs.outputs.results-json }}' | jq '.'
