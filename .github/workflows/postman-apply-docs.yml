name: Apply Postman Docs

# Triggered when a postman-docs/* branch is merged into main and YAML
# collection files change. Reads the approved descriptions from
# .postman/collections/ and PUTs them back to the live Postman collections
# via apply-from-repo mode.
#
# Required secrets: POSTMAN_API_KEY

on:
  push:
    branches: [main]
    paths:
      - '.postman/collections/**'

jobs:
  apply:
    name: Apply descriptions to Postman
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout postman-agent-docs-action
        uses: actions/checkout@v4
        with:
          repository: andrewpostymt/postman-agent-docs-action
          token:      ${{ secrets.GH_PAT }}
          path:       .github/actions/postman-agent-docs-action

      - name: Apply descriptions from repo to Postman
        uses: ./.github/actions/postman-agent-docs-action
        with:
          postman-api-key:  ${{ secrets.POSTMAN_API_KEY }}
          apply-from-repo:  'true'
